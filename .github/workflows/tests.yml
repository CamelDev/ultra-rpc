name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install dependencies
      run: bun install
    - name: Lint
      run: bun run lint
    - name: Install Playwright Browsers
      run: bunx playwright install --with-deps
    - name: Build App
      run: bun run build
    - name: Run Playwright tests
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- bun run test:e2e
        else
          bun run test:e2e
        fi
      shell: bash
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.os }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30
